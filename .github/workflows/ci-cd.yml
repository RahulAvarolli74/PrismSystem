name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# 1. ADDED PERMISSIONS: Required for uploading security results to the Security tab
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ═══════════════════════════════════════════════════
  # BACKEND TESTS
  # ═══════════════════════════════════════════════════
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # UPDATED: v3 -> v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # UPDATED: v3 -> v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Setup Prisma
        working-directory: backend
        run: npx prisma generate

      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          NODE_ENV: test

      - name: Lint code
        working-directory: backend
        run: npm run lint --if-present

  # ═══════════════════════════════════════════════════
  # FRONTEND TESTS
  # ═══════════════════════════════════════════════════
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # UPDATED: v3 -> v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # UPDATED: v3 -> v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Lint code
        working-directory: frontend
        run: npm run lint --if-present

  # ═══════════════════════════════════════════════════
  # DOCKER BUILD
  # ═══════════════════════════════════════════════════
  docker-build:
    needs: [ backend-tests, frontend-tests ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # UPDATED: v3 -> v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3 # UPDATED: v2 -> v3

      - name: Build backend image
        uses: docker/build-push-action@v5 # UPDATED: v4 -> v5
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: prism-backend:latest

      - name: Build frontend image
        uses: docker/build-push-action@v5 # UPDATED: v4 -> v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: prism-frontend:latest

  # ═══════════════════════════════════════════════════
  # SECURITY CHECKS
  # ═══════════════════════════════════════════════════
  security:
    runs-on: ubuntu-latest
    # Explicitly adding permissions here as well to be safe
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # UPDATED: v3 -> v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3 # UPDATED: v2 -> v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Setup Node.js for dependency check
        uses: actions/setup-node@v4 # UPDATED: v3 -> v4
        with:
          node-version: '20'

      - name: Check backend dependencies
        working-directory: backend
        run: npm audit --production || true

      - name: Check frontend dependencies
        working-directory: frontend
        run: npm audit --production || true