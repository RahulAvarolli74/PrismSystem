receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 256
    timeout: 5s

exporters:
  otlphttp/backend:
    endpoint: http://backend:3001
    encoding: json
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/backend]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/backend]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/backend]
